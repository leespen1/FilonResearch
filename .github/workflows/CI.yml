name: CI
on:
  push:
    branches:
      - main
    tags: '*'
  pull_request:
concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  test:
    name: ${{ matrix.package }} - Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # The two dev'd library packages live under lib/. The umbrella DrWatson
        # project itself is not unit-tested in CI (it pulls heavy, unregistered,
        # and cluster-only deps).
        package:
          - lib/FilonResearch
          - lib/ControlledOperators
        version:
          - '1'   # current stable release
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
        with:
          project: ${{ matrix.package }}
      - uses: julia-actions/julia-runtest@v1
        with:
          project: ${{ matrix.package }}

  # Umbrella-level integration tests, run in a lean environment (test/Project.toml)
  # that excludes the plotting stack so this job does not precompile Makie. The
  # umbrella is not a package, so julia-runtest (which calls Pkg.test) cannot be
  # used; instantiate and run the script directly instead.
  umbrella:
    name: umbrella (no plots) - Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1'
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - name: Instantiate lean test environment
        run: julia --project=test -e 'using Pkg; Pkg.instantiate()'
      - name: Run umbrella tests
        run: julia --project=test --color=yes test/runtests.jl
